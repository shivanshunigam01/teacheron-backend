# nginx site config for api.teacherpoint.in
# CORS is handled ONLY by Express (cors package) — do NOT add Access-Control-* here.
#
# First-time SSL (no cert yet):
#   1. Temporarily use only the HTTP block below with proxy_pass (no redirect).
#   2. sudo certbot certonly --nginx -d api.teacherpoint.in
#   3. Deploy this full config and: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name api.teacherpoint.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.teacherpoint.in;

    ssl_certificate /etc/letsencrypt/live/api.teacherpoint.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.teacherpoint.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header Origin $http_origin;
        proxy_pass_request_headers on;
    }
}
